<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Optimal</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
:root{
  --bg:#0a0a0a;--bg2:#111111;--bg3:#1a1a1a;--bg4:#222222;
  --blue:#3b82f6;--blue2:#60a5fa;
  --text:#ffffff;--text2:#a0a0a0;--text3:#555555;
  --border:#252525;--border2:#333333;
  --green:#22c55e;--yellow:#eab308;--red:#ef4444;
  --radius:14px;--radius2:22px;--radius3:11px;
  --font:'DM Sans',sans-serif;--fontd:'Bebas Neue',sans-serif;
}
.light{--bg:#f0f4ff;--bg2:#fff;--bg3:#e8edf8;--bg4:#dce4f5;--text:#0a0a1a;--text2:#4a5080;--text3:#8a90b8;--border:#d0d8f0;--border2:#c0cae8;--blue:#2563eb;--blue2:#1d4ed8}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--font);color:var(--text);max-width:430px;margin:0 auto;display:flex;flex-direction:column}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;overflow:hidden;position:relative}
.screen{flex:1;overflow-y:auto;padding-bottom:90px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain;scrollbar-width:none}
.screen::-webkit-scrollbar{display:none}
input,button,select,textarea{font-family:var(--font);outline:none;border:none;-webkit-appearance:none;appearance:none}
button{cursor:pointer;background:none}
select{background:var(--bg3);color:var(--text)}

/* ── AUTH ── */
.auth-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:32px 24px}
.auth-logo{font-family:var(--fontd);font-size:72px;letter-spacing:6px;color:var(--blue);line-height:1;margin-bottom:6px}
.auth-tag{color:var(--text3);font-size:12px;letter-spacing:3px;text-transform:uppercase;margin-bottom:52px}
.auth-card{background:var(--bg2);border-radius:var(--radius2);border:1px solid var(--border);padding:28px 24px;width:100%;max-width:370px}
.auth-tabs{display:flex;background:var(--bg3);border-radius:10px;padding:4px;margin-bottom:24px;gap:4px}
.auth-tab{flex:1;padding:11px;border-radius:8px;background:none;color:var(--text2);font-size:14px;font-weight:500;transition:all .2s;border:none}
.auth-tab.active{background:var(--blue);color:#fff}
.afield{margin-bottom:16px}
.afield label{display:block;font-size:11px;color:var(--text3);margin-bottom:6px;letter-spacing:.8px;text-transform:uppercase;font-weight:600}
.afield input{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--radius3);padding:15px 16px;color:var(--text);font-size:15px}
.afield input:focus{border-color:var(--blue);outline:none}
.btn-blue{width:100%;background:var(--blue);color:#fff;border-radius:var(--radius3);padding:16px;font-size:16px;font-weight:600;margin-top:8px;border:none}
.auth-err{color:var(--red);font-size:13px;text-align:center;margin-top:10px;min-height:18px}

/* ── NAV ── */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom,0);padding-top:2px}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 0 8px;gap:4px;background:none;color:var(--text3);font-size:9px;letter-spacing:.8px;text-transform:uppercase;font-weight:600;border:none}
.nav-item[data-active="true"]{color:var(--blue)}
.nav-icon svg{display:block}

/* ── PAGE ── */
.page-header{padding:20px 18px 12px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--bg);z-index:10;border-bottom:1px solid var(--border)}
.page-title{font-family:var(--fontd);font-size:30px;letter-spacing:2px}
.header-sub{font-size:12px;color:var(--text3);margin-top:1px}
.hdr-btn{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px 14px;color:var(--text2);font-size:13px;font-weight:500}
.section{padding:14px 16px}
.sec-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px;margin-bottom:10px;font-weight:700}
.card{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden}
.card-pad{padding:16px}

/* ── PROFILE ── */
.avatar{width:68px;height:68px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#1d4ed8);display:flex;align-items:center;justify-content:center;font-family:var(--fontd);font-size:26px;color:#fff;flex-shrink:0}
.stat-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.stat-card{background:var(--bg3);border-radius:var(--radius3);padding:12px 8px;text-align:center;border:1px solid var(--border)}
.stat-val{font-size:17px;font-weight:600;color:var(--blue2)}
.stat-lbl{font-size:10px;color:var(--text3);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}
.badge{display:inline-flex;align-items:center;gap:5px;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);border-radius:20px;padding:5px 13px;font-size:12px;color:var(--blue2);font-weight:500}
.chip-d{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:7px 15px;font-size:12px;color:var(--text2)}
.mmap-wrap{display:flex;gap:8px;justify-content:center;padding:8px 4px 4px}
.mleg{display:flex;gap:14px;justify-content:center;padding:6px 0 10px;flex-wrap:wrap}
.mleg-item{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text2)}
.mleg-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}

/* ── SPLIT ── */
.day-card{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:10px}
.day-num{font-family:var(--fontd);font-size:26px;color:var(--blue);width:34px;line-height:1;flex-shrink:0}
.day-info{flex:1;min-width:0}
.day-name{font-size:15px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.day-sub{font-size:12px;color:var(--text3);margin-top:2px}

/* ── WORKOUT ── */
.ex-card{background:var(--bg2);border-radius:var(--radius);border:1px solid var(--border);margin-bottom:10px;overflow:hidden}
.ex-hdr{padding:14px 16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
.ex-nm{font-size:15px;font-weight:500}
.ex-mu{font-size:11px;color:var(--text3);margin-top:2px}
.ex-body{padding:0 16px 14px;display:none}
.ex-body.open{display:block}
.set-row{display:flex;gap:6px;margin-bottom:8px;align-items:center}
.set-lbl{font-size:12px;color:var(--text3);width:38px;flex-shrink:0}
.set-inp{flex:1;background:var(--bg3);border:1.5px solid var(--border);border-radius:8px;padding:9px 6px;color:var(--text);font-size:14px;text-align:center;min-width:0}
.set-inp:focus{border-color:var(--blue);outline:none}
.set-unit{font-size:11px;color:var(--text3);width:28px;flex-shrink:0}
.prev-box{font-size:12px;color:var(--text3);margin-bottom:10px;padding:9px 12px;background:var(--bg3);border-radius:9px;border:1px solid var(--border);line-height:1.5}
.pr-badge{display:inline-flex;align-items:center;gap:4px;background:rgba(234,179,8,.12);border:1px solid rgba(234,179,8,.3);color:#eab308;border-radius:20px;padding:3px 9px;font-size:12px;font-weight:600}
.add-set-btn{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:9px;padding:10px;color:var(--text2);font-size:13px;margin-top:4px;font-weight:500}
.log-btn{width:100%;background:var(--blue);color:#fff;border-radius:var(--radius3);padding:14px;font-size:15px;font-weight:600;margin-top:10px;border:none}
.log-btn:active{opacity:.85}
.tip-box{display:flex;align-items:flex-start;gap:10px;background:rgba(59,130,246,.07);border:1px solid rgba(59,130,246,.18);border-radius:10px;padding:12px;margin-top:10px}
.tip-txt{font-size:12px;color:var(--text2);line-height:1.6}
.chev{color:var(--text3);display:flex;align-items:center;transition:transform .2s;flex-shrink:0}
.chev.open{transform:rotate(180deg)}

/* ── ANALYTICS ── */
.prog-wrap{margin:7px 0}
.prog-labels{display:flex;justify-content:space-between;font-size:12px;color:var(--text3);margin-bottom:4px}
.prog-bar{height:5px;background:var(--bg3);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;background:var(--blue);transition:width .6s ease}
.trend-up{color:var(--green);font-size:12px;font-weight:600}
.trend-dn{color:var(--red);font-size:12px;font-weight:600}
.trend-fl{color:var(--yellow);font-size:12px;font-weight:600}

/* ── SETTINGS ── */
.s-group{border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);margin-bottom:16px}
.s-row{background:var(--bg2);padding:15px 16px;display:flex;align-items:center;border-bottom:1px solid var(--border);cursor:pointer}
.s-row:last-child{border-bottom:none}
.s-icon{width:34px;height:34px;border-radius:10px;background:rgba(59,130,246,.1);display:flex;align-items:center;justify-content:center;margin-right:12px;flex-shrink:0}
.s-txt{flex:1;min-width:0}
.s-lbl{font-size:14px;font-weight:500}
.s-sub{font-size:11px;color:var(--text3);margin-top:2px}
.toggle{width:48px;height:28px;background:var(--border2);border-radius:14px;position:relative;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--blue)}
.tog-thumb{width:22px;height:22px;background:#fff;border-radius:50%;position:absolute;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.4)}
.toggle.on .tog-thumb{transform:translateX(20px)}
.logout-btn{width:100%;background:rgba(239,68,68,.1);border:1.5px solid rgba(239,68,68,.25);color:#ef4444;border-radius:var(--radius3);padding:16px;font-size:15px;font-weight:600}

/* ── MODAL SHEET ── */
.m-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:300;display:flex;align-items:flex-end;justify-content:center}
.m-sheet{background:var(--bg2);border-radius:var(--radius2) var(--radius2) 0 0;width:100%;max-width:430px;max-height:92dvh;overflow-y:auto;padding:0 0 env(safe-area-inset-bottom,20px);overscroll-behavior:contain}
.m-handle{width:38px;height:4px;background:var(--border2);border-radius:2px;margin:14px auto 20px}
.m-title{font-family:var(--fontd);font-size:28px;letter-spacing:1px;padding:0 20px;margin-bottom:20px}
.ef{margin:0 20px 14px}
.elbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;font-weight:600}
.einp{width:100%;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--radius3);padding:14px;color:var(--text);font-size:15px}
.einp:focus{border-color:var(--blue);outline:none}
.save-btn{display:block;margin:8px 20px 0;width:calc(100% - 40px);background:var(--blue);color:#fff;border-radius:var(--radius3);padding:16px;font-size:16px;font-weight:600;border:none}
.cgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:0 20px 14px}
.cchip{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--radius3);padding:12px;text-align:center;font-size:13px;color:var(--text2);cursor:pointer;transition:all .2s;font-weight:500}
.cchip.on{background:rgba(59,130,246,.12);border-color:rgba(59,130,246,.4);color:var(--blue2)}
.split-opt{background:var(--bg2);border-radius:var(--radius);border:1.5px solid var(--border);padding:15px 18px;margin:0 20px 10px;cursor:pointer;transition:all .15s}
.split-opt.on{border-color:var(--blue);background:rgba(59,130,246,.05)}
.mdet-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.mdet-row:last-child{border-bottom:none}

/* ── EXERCISE EDITOR ── */
.exed-item{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid var(--border)}
.exed-item:last-child{border-bottom:none}
.exed-nm{font-size:14px;flex:1;padding-right:8px}
.del-btn{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#ef4444;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:600;flex-shrink:0}
.ex-tag-list{display:flex;flex-wrap:wrap;gap:7px;margin-bottom:12px;min-height:34px}
.ex-tag{background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.3);color:var(--blue2);border-radius:20px;padding:6px 12px;font-size:13px;display:flex;align-items:center;gap:6px}
.ex-tag-x{font-size:17px;opacity:.7;cursor:pointer;line-height:1}
.ex-inp-row{display:flex;gap:8px}
.ex-ainp{flex:1;background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--radius3);padding:13px 14px;color:var(--text);font-size:14px}
.ex-ainp:focus{border-color:var(--blue);outline:none}
.ex-abtn{background:var(--blue);color:#fff;border-radius:var(--radius3);padding:13px 16px;font-size:20px;font-weight:600;flex-shrink:0;border:none;line-height:1}
.preset-sec-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;font-weight:700;margin:14px 0 8px}
.preset-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.preset-chip{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:6px 12px;font-size:12px;color:var(--text2);cursor:pointer;transition:all .15s}
.preset-chip:active{background:rgba(59,130,246,.1);color:var(--blue2);border-color:rgba(59,130,246,.3)}
.preset-chip.recent{background:rgba(234,179,8,.08);border-color:rgba(234,179,8,.25);color:#eab308}

/* ── ONBOARDING ── */
.ob-wrap{position:fixed;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;overflow:hidden}
.ob-prog{height:3px;background:var(--border);flex-shrink:0}
.ob-bar{height:100%;background:var(--blue);border-radius:0 2px 2px 0;transition:width .4s ease}
.ob-body{flex:1;overflow-y:auto;padding:28px 24px 16px;overscroll-behavior:contain;scrollbar-width:none}
.ob-body::-webkit-scrollbar{display:none}
.ob-snum{font-size:11px;color:var(--blue2);text-transform:uppercase;letter-spacing:1.5px;font-weight:700;margin-bottom:8px}
.ob-title{font-family:var(--fontd);font-size:34px;letter-spacing:2px;margin-bottom:6px;line-height:1.1}
.ob-sub{font-size:14px;color:var(--text3);margin-bottom:28px;line-height:1.6}
.ob-foot{padding:14px 24px calc(env(safe-area-inset-bottom,0px) + 14px);border-top:1px solid var(--border);background:var(--bg);flex-shrink:0}
.ob-next{width:100%;background:var(--blue);color:#fff;border-radius:var(--radius3);padding:17px;font-size:16px;font-weight:600;border:none}
.ob-skip{width:100%;background:none;border:none;color:var(--text3);font-size:14px;padding:10px;margin-top:4px}
.ob-f{margin-bottom:18px}
.ob-lbl{font-size:11px;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;font-weight:700;margin-bottom:7px}
.ob-inp{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius3);padding:14px 16px;color:var(--text);font-size:15px}
.ob-inp:focus{border-color:var(--blue);outline:none}
.ob-sel{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius3);padding:14px;color:var(--text);font-size:15px}
.ob-chips{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:4px}
.ob-chip{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--radius3);padding:13px 10px;text-align:center;font-size:14px;color:var(--text2);font-weight:500;cursor:pointer;transition:all .2s}
.ob-chip.on{background:rgba(59,130,246,.12);border-color:var(--blue);color:var(--blue2)}

/* ── WEEKLY ── */
.wk-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:400;display:flex;align-items:center;justify-content:center;padding:16px;overflow-y:auto}
.wk-card{background:var(--bg2);border-radius:var(--radius2);padding:28px 24px;width:100%;max-width:390px;border:1px solid var(--border);max-height:82dvh;overflow-y:auto}
.wk-title{font-family:var(--fontd);font-size:36px;color:var(--blue);letter-spacing:3px;margin-bottom:4px}
.wk-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border)}
.wk-row:last-of-type{border-bottom:none}

/* ── ANIM ── */
.fade-in{animation:fadeUp .28s ease both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.sheet-in{animation:sheetUp .3s cubic-bezier(.32,1,.23,1) both}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.slide-in{animation:slideIn .32s cubic-bezier(.32,1,.23,1) both}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ─── DB ───
const DB={
  get:(k,d)=>{try{const v=localStorage.getItem(k);return v===null?d:JSON.parse(v)}catch{return d}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}
};

// ─── STATE ───
const S={
  users:  DB.get('fg_users',{}),
  current:DB.get('fg_current',null),
  theme:  DB.get('fg_theme','dark'),
  logs:   DB.get('fg_logs',{}),      // {user:{date:{ex:[sets]}}}
  customEx:DB.get('fg_customEx',{}), // {user:{day:[exArr]}}
  customSplitDef:DB.get('fg_customSplit',null), // custom split day structure
  userExInfo:DB.get('fg_userExInfo',{}), // {exName:{muscle,typicalWeight}} for custom exercises
  tab:'profile', day:null,
  save(){DB.set('fg_users',this.users);DB.set('fg_logs',this.logs);DB.set('fg_customEx',this.customEx);DB.set('fg_current',this.current);DB.set('fg_customSplit',this.customSplitDef);DB.set('fg_userExInfo',this.userExInfo);},
  u(){return this.current?this.users[this.current]:null},
  patch(d){if(!this.current)return;Object.assign(this.users[this.current],d);this.save()},
  // ── Log sets for exercise (name is the universal key) ──
  logSets(ex,sets){
    if(!this.current)return;
    if(!this.logs[this.current])this.logs[this.current]={};
    const today=new Date().toISOString().slice(0,10);
    if(!this.logs[this.current][today])this.logs[this.current][today]={};
    this.logs[this.current][today][ex]=sets;
    this.save();
  },
  // ── All history for an exercise, newest first, across ALL days ──
  exHist(ex){
    const all=this.logs[this.current]||{};
    return Object.entries(all)
      .sort((a,b)=>b[0]<a[0]?-1:1)
      .map(([d,day])=>day[ex]?{date:d,sets:day[ex]}:null)
      .filter(Boolean);
  },
  getPR(ex){
    let pr=null;
    this.exHist(ex).forEach(e=>e.sets.forEach(s=>{
      const v=(+s.w||0)*(+s.r||0);if(v>0&&(!pr||v>pr.v))pr={w:+s.w,r:+s.r,v,date:e.date};
    }));
    return pr;
  },
  weekLogs(){
    const all=this.logs[this.current]||{};const now=Date.now();
    return Object.entries(all).filter(([d])=>(now-new Date(d).getTime())<7*864e5);
  },
  getDayEx(day){
    const u=this.u();if(!u)return[];
    // Always read from the live in-memory object (setDayEx updates it directly)
    const cx=this.customEx[this.current]||{};
    if(cx[day]!==undefined)return [...cx[day]];
    return [...(getActiveSplit(u.split||'Push Pull Legs')?.ex?.[day]||[])];
  },
  setDayEx(day,arr){
    if(!this.current)return;
    if(!this.customEx[this.current])this.customEx[this.current]={};
    this.customEx[this.current][day]=[...arr];
    this.save();
  },
  // ── All exercises the user has ever used (for recently used) ──
  allUsedEx(){
    const all=this.logs[this.current]||{};
    const seen={};
    Object.entries(all).sort((a,b)=>b[0]<a[0]?-1:1).forEach(([d,day])=>{
      Object.keys(day).forEach(ex=>{if(!seen[ex])seen[ex]=d});
    });
    return Object.entries(seen).sort((a,b)=>b[1]<a[1]?-1:1).map(e=>e[0]);
  },
  // ── All exercises currently in ANY day's list ──
  allDayExercises(){
    const u=this.u();if(!u)return[];

function dayCats(day){
  const d=day.toLowerCase();
  for(const[k,cats]of Object.entries(DAY_CATS)){if(d.includes(k))return cats;}
  return['Chest','Back','Legs','Shoulders','Biceps','Triceps'];
}

// Get smart presets for a day, pulling from same-type days too
function smartPresets(day, currentExs=[]){
  const cats=dayCats(day);
  // Base: all exercises from relevant categories
  const base=cats.flatMap(c=>ALL_EX[c]||[]);
  // Cross-day: exercises already used in days with overlapping categories
  const u=S.u();
  const split=SPLITS[u?.split||'Push Pull Legs'];
  const related=new Set();
  (split?.days||[]).filter(d=>d!=='Rest'&&d!==day).forEach(d=>{
    const dc=dayCats(d);if(cats.some(c=>dc.includes(c))){
      S.getDayEx(d).forEach(e=>related.add(e));
    }
  });
  // Combine: related first (so shared exercises surface), then base
  const combined=[...related,...base].filter(e=>!currentExs.includes(e));
  // Deduplicate maintaining order
  const seen=new Set();const result=[];
  combined.forEach(e=>{if(!seen.has(e)){seen.add(e);result.push(e);}});
  return result.slice(0,20);
}

    <div class="ob-f">
      <div class="ob-lbl">Height</div>
      <div style="display:flex;gap:8px;align-items:center">

        </select>

      </div>
    </div>
    <div class="ob-f">
      <div class="ob-lbl">Weight</div>
      <div style="display:flex;gap:8px">
        <input class="ob-inp" id="ob-w" value="${u.weight||''}" placeholder="75" type="number" inputmode="decimal" style="flex:1">
        <select class="ob-sel" id="ob-wu" style="width:70px"><option${u.weightUnit==='kg'?' selected':''}>kg</option><option${u.weightUnit==='lbs'?' selected':''}>lbs</option></select>
      </div>
    </div>
    <div class="ob-f"><div class="ob-lbl">Lifting Level</div></div>
    <div class="ob-chips" id="ob-lvl">${['Beginner','Intermediate','Advanced','Custom'].map(l=>`<div class="ob-chip${u.level===l?' on':''}" onclick="obChip(this,'ob-lvl')">${l}</div>`).join('')}</div>
    <div class="ob-f" style="margin-top:4px"><div class="ob-lbl">Fitness Goal</div></div>
    <div class="ob-chips" id="ob-goal">${['Bulking','Hypertrophy','Cutting','Maintenance'].map(g=>`<div class="ob-chip${u.goal===g?' on':''}" onclick="obChip(this,'ob-goal')">${g}</div>`).join('')}</div>`;
    foot=`<button class="ob-next" onclick="obSaveProfile()">Continue →</button><button class="ob-skip" onclick="obAdv()">Skip for now</button>`;
  }
  else if(OB.step===2){
    // Split
    const u=S.u();
    body=`<div class="ob-snum">Step 2 of ${totalSteps}</div>
    <div class="ob-title">YOUR SPLIT</div>
    <div class="ob-sub">How do you structure your training week?</div>
    ${Object.keys(SPLITS).map(s=>`<div class="split-opt${(u.split||'Push Pull Legs')===s?' on':''}" data-sn="${s}" onclick="obPickSplit(this)">
      <div style="font-size:15px;font-weight:600">${s}</div>
      <div style="font-size:12px;color:var(--text3);margin-top:3px">${SPLITS[s].days.join(' · ')}</div>
    </div>`).join('')}`;
    foot=`<button class="ob-next" onclick="obSaveSplit()">Continue →</button>`;
  }
  else{
    // Day exercise steps: step 3 = OB.days[0], step 4 = OB.days[1], etc.
    const dayIdx=OB.step-3;
    if(dayIdx>=OB.days.length){
      // All days done → show strength calibration step
      OB.days.forEach(d=>S.setDayEx(d,[...(OB.dayEx[d]||[])]));
      showStrengthCalibration();
      return;
    }
    const day=OB.days[dayIdx];
    const exs=OB.dayEx[day]||[];
    const presets=smartPresets(day,exs);
    const recent=recentlyUsed(exs);
    const isLast=dayIdx===OB.days.length-1;
    body=`<div class="ob-snum">Step ${OB.step-1} of ${totalSteps}</div>
    <div class="ob-title">${day.toUpperCase()}</div>
    <div class="ob-sub">Set exercises for <strong style="color:var(--blue2)">${day}</strong>. Edit anytime later.</div>
    <div class="ob-f">
      <div class="ob-lbl">Your Exercises</div>
      <div class="ex-tag-list" id="ob-tags">${exs.map((e,i)=>`<div class="ex-tag">${e}<span class="ex-tag-x" onclick="obDelEx(${i})">×</span></div>`).join('')}</div>
      <div class="ex-inp-row">
        <input class="ex-ainp" id="ob-inp" placeholder="Type exercise name..." onkeydown="if(event.key==='Enter'){event.preventDefault();obAddInp()}">
        <button class="ex-abtn" onclick="obAddInp()">+</button>
      </div>
    </div>
    ${recent.length?`<div class="preset-sec-lbl">⏱ Recently Used</div><div class="preset-list">${recent.map(e=>`<div class="preset-chip recent" onclick="obAddEx('${e.replace(/'/g,"\\'")}')">${e}</div>`).join('')}</div>`:''}
    <div class="preset-sec-lbl">Quick Add — ${dayCats(day).join(' / ')}</div>
    <div class="preset-list" id="ob-presets">${presets.slice(0,20).map(e=>`<div class="preset-chip" onclick="obAddEx('${e.replace(/'/g,"\\'")}')">${e}</div>`).join('')}</div>`;
    foot=`<button class="ob-next" onclick="obAdv()">${isLast?'Finish Setup →':'Next Day →'}</button>`;
  }

  wrap.innerHTML=`<div class="ob-prog"><div class="ob-bar" style="width:${pct}%"></div></div><div class="ob-body slide-in">${body}</div><div class="ob-foot">${foot}</div>`;
  document.getElementById('app').appendChild(wrap);
}

// OB helpers
window.obChip=(el,gId)=>{document.getElementById(gId)?.querySelectorAll('.ob-chip').forEach(c=>c.classList.remove('on'));el.classList.add('on')};
window.obPickSplit=el=>{document.querySelectorAll('.split-opt').forEach(c=>c.classList.remove('on'));el.classList.add('on')};

window.obAdv=()=>{OB.step++;drawOB()};

window.obSaveProfile=()=>{
  const name=document.getElementById('ob-name')?.value.trim();
  if(!name){alert('Please enter your name');return}
  const {height,heightUnit}=readH('ob-hu');
  const weight=document.getElementById('ob-w')?.value||'';
  const weightUnit=document.getElementById('ob-wu')?.value||'lbs';
  const level=document.querySelector('#ob-lvl .ob-chip.on')?.textContent||'Beginner';
  const goal=document.querySelector('#ob-goal .ob-chip.on')?.textContent||'Hypertrophy';
  S.patch({name,birthday:document.getElementById('ob-bday')?.value||'',height,heightUnit,weight,weightUnit,level,goal});
  obAdv();
};

window.obSaveSplit=()=>{
  const sel=document.querySelector('.split-opt.on');
  const sn=sel?.dataset.sn||'Push Pull Legs';
  // Never wipe customEx — keep all saved days so switching back restores them
  S.patch({split:sn});
  const split=getActiveSplit(sn);
  OB.days=(split?.days||[]).filter(d=>d!=='Rest');
  // Pre-fill from saved exercises so the wizard shows what the user already set
  OB.dayEx={};OB.days.forEach(d=>{OB.dayEx[d]=[...S.getDayEx(d)]});
  obAdv();
};

// Current day being edited in OB
function obCurDay(){return OB.days[OB.step-3]}
window.obDelEx=idx=>{const d=obCurDay();OB.dayEx[d].splice(idx,1);obRefreshTags()};
window.obAddInp=()=>{
  const inp=document.getElementById('ob-inp');if(!inp)return;
  const val=inp.value.trim();if(!val)return;
  if(window._ede&&window._ede.exs&&window._ede.exs.includes(val)){inp.value='';return;}
  if(!isKnownEx(val)){
    inp.value='';
    promptNewExercise(val,function(name){obAddEx(name);});
    return;
  }
  obAddEx(val);inp.value='';
};
window.obAddEx=ex=>{
  const d=obCurDay();if(!d)return;
  if(!OB.dayEx[d])OB.dayEx[d]=[];
  if(!OB.dayEx[d].includes(ex))OB.dayEx[d].push(ex);
  obRefreshTags();
  // Remove from presets list if present
  document.querySelectorAll('#ob-presets .preset-chip').forEach(el=>{if(el.textContent===ex)el.remove()});
};
function obRefreshTags(){
  const d=obCurDay();const exs=OB.dayEx[d]||[];
  const t=document.getElementById('ob-tags');
  if(t)t.innerHTML=exs.map((e,i)=>`<div class="ex-tag">${e}<span class="ex-tag-x" onclick="obDelEx(${i})">×</span></div>`).join('');
}

// ─── STRENGTH CALIBRATION ───
// Called after onboarding day steps complete - asks user starting strength per muscle
var MUSCLE_GROUPS=['Chest','Back','Shoulders','Biceps','Triceps','Quads','Hamstrings','Glutes','Calves','Abs'];
var MUSCLE_LEVELS={
  Beginner:  {label:'Beginner',  sub:'Just starting out',     val:25, emoji:'🌱'},
  Average:   {label:'Average',   sub:'Training for a while',  val:50, emoji:'💪'},
  Strong:    {label:'Strong',    sub:'Consistent & progressing', val:72, emoji:'🔥'},
  Elite:     {label:'Elite',     sub:'Competitive level',     val:90, emoji:'⚡'}
};

function showStrengthCalibration(){
  // Build initial selections - all Average by default
  var selections={};
  MUSCLE_GROUPS.forEach(function(m){ selections[m]='Average'; });
  window._strengthSel=selections;
  drawStrengthCal();
}

function drawStrengthCal(){
  var sel=window._strengthSel;
  document.getElementById('app').innerHTML='';
  var wrap=document.createElement('div');
  wrap.className='ob-wrap';

  var muscleRows=MUSCLE_GROUPS.map(function(m){
    var cur=sel[m];
    var btns=Object.keys(MUSCLE_LEVELS).map(function(lk){
      var lv=MUSCLE_LEVELS[lk];
      var isOn=cur===lk;
      var borderC=isOn?'var(--blue)':'var(--border)';
      var bgC=isOn?'rgba(59,130,246,.15)':'var(--bg3)';
      var textC=isOn?'var(--blue2)':'var(--text3)';
      return '<button data-m="'+m+'" data-l="'+lk+'" onclick="setStrengthSel(this)" style="'
        +'flex:1;padding:8px 4px;border-radius:8px;font-size:11px;font-weight:600;'
        +'border:1.5px solid '+borderC+';background:'+bgC+';color:'+textC+';">'
        +lv.emoji+'<br>'+lv.label+'</button>';
    }).join('');
    return '<div style="margin-bottom:14px">'
      +'<div style="font-size:13px;font-weight:600;margin-bottom:6px">'+m+'</div>'
      +'<div style="display:flex;gap:6px;">'+btns+'</div>'
      +'</div>';
  }).join('');

  var body='<div class="ob-snum">Final Step</div>'
    +'<div class="ob-title">YOUR STARTING STRENGTH</div>'
    +'<div class="ob-sub">Rate your current level for each muscle group. This sets your muscle map — you can update it any time by logging workouts.</div>'
    +muscleRows;

  var foot='<button class="ob-next" onclick="saveStrengthCal()">Finish Setup →</button>';

  wrap.innerHTML='<div class="ob-prog"><div class="ob-bar" style="width:98%"></div></div>'
    +'<div class="ob-body slide-in">'+body+'</div>'
    +'<div class="ob-foot">'+foot+'</div>';
  document.getElementById('app').appendChild(wrap);
}

window.setStrengthSel=function(el){
  var muscle=el.dataset.m;
  var level=el.dataset.l;
  window._strengthSel[muscle]=level;
  drawStrengthCal();
};

window.saveStrengthCal=function(){
  var ms={};
  var sel=window._strengthSel;
  // Include all muscles, not just the ones shown
  var allMuscles=['Chest','Back','Biceps','Triceps','Shoulders','Quads','Hamstrings','Glutes','Calves','Abs','Traps'];
  // Map shown muscles to internal muscle names
  var groupMap={
    'Chest':'Chest','Back':'Back','Shoulders':'Shoulders',
    'Biceps':'Biceps','Triceps':'Triceps','Quads':'Quads',
    'Hamstrings':'Hamstrings','Glutes':'Glutes','Calves':'Calves','Abs':'Abs'
  };
  // Start all at 50
  allMuscles.forEach(function(m){ ms[m]=50; });
  // Apply user selections
  Object.keys(sel).forEach(function(g){
    var internal=groupMap[g];
    if(internal){
      ms[internal]=MUSCLE_LEVELS[sel[g]].val;
    }
  });
  // Traps stays neutral
  ms['Traps']=50;
  S.patch({muscleStrength:ms, onboarded:true});
  render();
};

// All known exercise names (fast lookup)
function isKnownEx(name){
  return !!EX_MUSCLE[name] || !!S.userExInfo[name];
}

// Show the "what muscle does this target?" popup
// onConfirm(name) is called after user saves
function promptNewExercise(name, onConfirm){
  const muscles=['Chest','Back','Shoulders','Biceps','Triceps','Quads','Hamstrings','Glutes','Calves','Abs','Traps'];
  // Pre-select based on any partial match in name
  const nameLow=name.toLowerCase();
  let presel='Chest';
  if(nameLow.includes('back')||nameLow.includes('row')||nameLow.includes('pull')||nameLow.includes('lat'))presel='Back';
  else if(nameLow.includes('shoulder')||nameLow.includes('delt')||nameLow.includes('press')||nameLow.includes('lateral'))presel='Shoulders';
  else if(nameLow.includes('bicep')||nameLow.includes('curl'))presel='Biceps';
  else if(nameLow.includes('tricep')||nameLow.includes('pushdown')||nameLow.includes('extension'))presel='Triceps';
  else if(nameLow.includes('squat')||nameLow.includes('quad')||nameLow.includes('leg'))presel='Quads';
  else if(nameLow.includes('hamstring')||nameLow.includes('deadlift')||nameLow.includes('rdl'))presel='Hamstrings';
  else if(nameLow.includes('glute')||nameLow.includes('hip')||nameLow.includes('lunge'))presel='Glutes';
  else if(nameLow.includes('calf')||nameLow.includes('calves'))presel='Calves';
  else if(nameLow.includes('ab')||nameLow.includes('core')||nameLow.includes('crunch')||nameLow.includes('plank'))presel='Abs';
  else if(nameLow.includes('trap')||nameLow.includes('shrug'))presel='Traps';
  else if(nameLow.includes('chest')||nameLow.includes('bench')||nameLow.includes('fly')||nameLow.includes('pec'))presel='Chest';

  // Store pending state
  window._newEx={name, muscle:presel, onConfirm};

  const muscleBtns=muscles.map(m=>`<button data-m="${m}" onclick="newExSelectMuscle(this)" style="padding:9px 14px;border-radius:20px;font-size:13px;font-weight:500;border:1.5px solid ${m===presel?'var(--blue)':'var(--border)'};background:${m===presel?'rgba(59,130,246,.12)':'var(--bg3)'};color:${m===presel?'var(--blue2)':'var(--text2)'}">${m}</button>`).join('');

  showSheet(`<div class="m-handle"></div>
  <div class="m-title">New Exercise</div>
  <div style="padding:0 20px">
    <div style="background:var(--bg3);border-radius:var(--radius3);padding:13px 15px;margin-bottom:18px;border:1px solid var(--border)">
      <div style="font-size:12px;color:var(--text3);margin-bottom:3px;text-transform:uppercase;letter-spacing:.6px;font-weight:600">Exercise</div>
      <div style="font-size:16px;font-weight:600">${name}</div>
    </div>
    <div style="font-size:13px;font-weight:600;margin-bottom:10px">What muscle does this target?</div>
    <div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px" id="new-ex-muscles">${muscleBtns}</div>
    <div style="font-size:13px;font-weight:600;margin-bottom:8px">Typical weight you lift to failure</div>
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <input class="einp" id="new-ex-weight" type="number" inputmode="decimal" placeholder="e.g. 135" style="flex:1">
      <span style="font-size:14px;color:var(--text3);flex-shrink:0">lbs</span>
    </div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:20px;line-height:1.5">This helps calibrate your muscle map. Leave blank if unsure.</div>
    <button class="log-btn" style="margin-top:0" onclick="newExConfirm()">Add Exercise</button>
    <button style="width:100%;padding:14px;color:var(--text3);font-size:14px;background:none;border:none;margin-top:4px" onclick="closeSheet()">Cancel</button>
    <div style="height:8px"></div>
  </div>`);
}

window.newExSelectMuscle=function(btn){
  window._newEx.muscle=btn.dataset.m;
  document.querySelectorAll('#new-ex-muscles button').forEach(function(b){
    var sel=b.dataset.m===window._newEx.muscle;
    b.style.borderColor=sel?'var(--blue)':'var(--border)';
    b.style.background=sel?'rgba(59,130,246,.12)':'var(--bg3)';
    b.style.color=sel?'var(--blue2)':'var(--text2)';
  });
};

window.newExConfirm=function(){
  var ex=window._newEx;if(!ex)return;
  var weight=parseFloat(document.getElementById('new-ex-weight')?.value)||0;
  // Save to userExInfo
  S.userExInfo[ex.name]={muscle:ex.muscle, typicalWeight:weight};
  DB.set('fg_userExInfo',S.userExInfo);
  // Update muscle strength based on typical weight if provided
  if(weight>0){
    const u=S.u();if(u){
      const ms={...u.muscleStrength||{}};
      // Estimate strength level: compare against rough benchmarks per muscle
      const BENCH={Chest:135,Back:120,Shoulders:65,Biceps:35,Triceps:50,
                   Quads:180,Hamstrings:120,Glutes:135,Calves:80,Abs:40,Traps:95};
      const bench=BENCH[ex.muscle]||100;
      // Map weight vs benchmark to a 0-100 strength value
      const ratio=weight/bench;
      const str=Math.min(100,Math.max(10,Math.round(ratio*55)));
      ms[ex.muscle]=Math.max(ms[ex.muscle]||0,str); // only increase, never decrease
      S.patch({muscleStrength:ms});
    }
  }
  closeSheet();
  if(ex.onConfirm)ex.onConfirm(ex.name);
};

function analyticsCard(){
  // Volume = total lbs lifted (weight × reps) per muscle this week
  // % shown = how close you are to a good weekly target for that muscle
  // Targets account for muscle size: big muscles (legs, back, chest) need more volume
  const TARGETS={
    'Chest':8000,'Back':10000,'Shoulders':7000,'Quads':12000,'Hamstrings':8000,
    'Biceps':4000,'Triceps':4000,'Glutes':7000,'Calves':3000,'Abs':2500,'Traps':3000
  };
  const ms=['Chest','Back','Shoulders','Quads','Hamstrings','Biceps','Triceps','Calves','Abs'];
  const wk=S.weekLogs();
  const muscleVol={};
  wk.forEach(([,day])=>Object.entries(day).forEach(([ex,sets])=>{
    const m=muscleOf(ex);if(m==='Compound')return;
    if(!muscleVol[m])muscleVol[m]=0;
    sets.forEach(s=>muscleVol[m]+=(+s.w||0)*(+s.r||0));
  }));
  const u2=S.u();
  const rows=ms.map(m=>{
    const v=muscleVol[m]||0;
    // Scale target based on current strength — stronger muscles need more volume to maintain
    const baseTarget=TARGETS[m]||8000;
    const str=(u2?.muscleStrength?.[m])||50;
    const scaledTarget=Math.round(baseTarget*(0.7+str/100*0.6));
    const pct=Math.min(100,Math.round((v/scaledTarget)*100));
    return{n:m,v:pct,raw:v,target:scaledTarget};
  });
  const total=rows.reduce((s,r)=>s+r.raw,0);
  return`<div class="card card-pad" style="margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <div style="font-size:15px;font-weight:500">Volume by Muscle</div>
      <span class="trend-up">${wk.length} sessions this week</span>
    </div>
    <div style="font-size:11px;color:var(--text3);margin-bottom:12px;line-height:1.4">
      % of your weekly volume target. Target scales up as you get stronger — stronger muscles need more work to maintain.
    </div>
    ${total===0?`<div style="font-size:13px;color:var(--text3);padding:8px 0">Log some workouts to see your volume here.</div>`:
    rows.map(m=>`<div class="prog-wrap"><div class="prog-labels"><span>${m.n}</span><span style="color:${m.v>=80?'var(--green)':m.v>=40?'var(--blue2)':'var(--text3)'}">${m.v}%</span></div><div class="prog-bar"><div class="prog-fill" style="width:${m.v}%;background:${m.v>=80?'var(--green)':m.v>=40?'var(--blue)':'var(--yellow)'}"></div></div></div>`).join('')}
  </div>`;
}

window.cseRename=function(inp){
  var i=parseInt(inp.dataset.di);
  window._cse.days[i]=inp.value||'Day '+(i+1);
};
window.cseToggleRest=function(i){
  var days=window._cse.days;
  if(days[i]==='Rest'){
    // Find a unique day name
    var n=1;while(days.includes('Day '+n))n++;
    days[i]='Day '+n;
  } else {
    days[i]='Rest';
  }
  drawCSE();
};
window.cseMoveUp=function(i){
  if(i===0)return;
  var days=window._cse.days;
  var tmp=days[i];days[i]=days[i-1];days[i-1]=tmp;
  drawCSE();
};
window.cseMoveDown=function(i){
  var days=window._cse.days;
  if(i>=days.length-1)return;
  var tmp=days[i];days[i]=days[i+1];days[i+1]=tmp;
  drawCSE();
};
window.cseRemove=function(i){
  if(window._cse.days.length<=1)return;
  window._cse.days.splice(i,1);
  drawCSE();
};
window.cseAddDay=function(){
  var days=window._cse.days;
  var n=1;while(days.includes('Day '+n))n++;
  days.push('Day '+n);
  drawCSE();
};
window.cseAddRest=function(){
  window._cse.days.push('Rest');
  drawCSE();
};

window.edeAddInp=function(){

  if(!inp)return;

  if(window._ede.exs.includes(val)){inp.value='';return;}

  inp.value='';

};

  const u=S.u();
  const init=u.strengthInit||{};
  // Find exercises that have no log history AND haven't been init'd
  const todo=exList.filter(ex=>!init[ex]&&S.exHist(ex).length===0);
  if(!todo.length)return;
  showStrengthWizard(todo,0);
}

    +'</div>'
  );

// Strength tiers per muscle (lbs reference: below avg / avg / above avg / strong)
// Based on general population intermediate standards
const STRENGTH_TIERS={
  Chest:      [65,115,165,215],   // bench-type
  Back:       [95,155,215,275],   // row/pull-type
  Biceps:     [30,55,80,105],
  Triceps:    [40,65,95,130],
  'Shoulders': [45,80,115,155],
  Quads:      [95,165,235,315],
  Hamstrings: [75,135,195,255],
  Glutes:     [75,135,200,270],
  Calves:     [55,100,155,210],
  Abs:        [0,0,0,0],          // bodyweight, skip
  Traps:      [55,95,140,190],
  Compound:   [95,155,225,295],
};

function weightToStrength(ex,w,r){
  // Estimate 1RM using Epley formula, then compare to tiers
  const oneRM=w*(1+r/30);
  const m=muscleOf(ex);
  const tiers=STRENGTH_TIERS[m]||STRENGTH_TIERS.Compound;
  if(tiers[0]===0)return 50; // bodyweight exercises default to average
  if(oneRM<tiers[0])return 20;
  if(oneRM<tiers[1])return 35;
  if(oneRM<tiers[2])return 55;
  if(oneRM<tiers[3])return 72;
  return 88;
}

window.swSave=function(){
  var ex=_sw.todo[_sw.idx];
  var w=parseFloat(document.getElementById('sw-w').value)||0;
  var r=parseInt(document.getElementById('sw-r').value)||0;
  if(!w||!r){alert('Please enter weight and reps, or tap Skip.');return;}
  var u=S.u();
  var init=Object.assign({},u.strengthInit||{});
  init[ex]=true;
  var m=muscleOf(ex);
  var ms=Object.assign({},u.muscleStrength||{});
  var newVal=weightToStrength(ex,w,r);
  var existing=ms[m]||50;
  ms[m]=init[ex+'_c']?Math.round((existing+newVal)/2):newVal;
  init[ex+'_c']=true;
  S.patch({strengthInit:init,muscleStrength:ms});
  showStrengthWizard(_sw.todo,_sw.idx+1);
};

window.swSkip=function(){
  var ex=_sw.todo[_sw.idx];
  var u=S.u();
  var init=Object.assign({},u.strengthInit||{});
  init[ex]=true;
  S.patch({strengthInit:init});
  showStrengthWizard(_sw.todo,_sw.idx+1);
};

window.logEx=(ex,idx)=>{
  const sets=[];let i=0;
  while(true){
    const wi=document.getElementById(`w-${idx}-${i}`);const ri=document.getElementById(`r-${idx}-${i}`);
    if(!wi)break;
    const w=parseFloat(wi.value||wi.placeholder)||0;const r=parseInt(ri.value||ri.placeholder)||0;
    if(w>0&&r>0)sets.push({w,r});i++;
  }
  if(!sets.length){alert('Enter weight & reps first!');return}
  // Get old PR BEFORE saving so we can compare properly
  const oldPR=S.getPR(ex);
  S.logSets(ex,sets);
  // Update muscle strength
  const m=muscleOf(ex);if(m!=='Compound'){const u=S.u();const ms={...u.muscleStrength||{}};ms[m]=Math.min(100,(ms[m]||50)+2);S.patch({muscleStrength:ms});}
  const newBest=sets.reduce((b,s)=>Math.max(b,s.w*s.r),0);
  // True PR: logged something AND it beats the previous best (or is first ever)
  const isPR=newBest>0&&(!oldPR||newBest>oldPR.v);
  showSheet(`<div class="m-handle"></div>
  <div style="text-align:center;padding:0 20px">
    ${isPR?`<div style="font-size:52px;margin:16px 0">🏆</div><div class="pr-badge" style="font-size:16px;padding:8px 20px;margin-bottom:12px;display:inline-flex">NEW RECORD!</div>`:`<div style="font-size:48px;margin:16px 0">✅</div>`}
    <div class="m-title" style="padding:0;text-align:center">${isPR?'New PR!':'Sets Logged!'}</div>
    <div style="font-size:13px;color:var(--text3);margin-bottom:20px">${ex}</div>
  </div>
  <div style="padding:0 20px">
    <div style="background:var(--bg3);border-radius:11px;padding:14px;border:1px solid var(--border);margin-bottom:16px">

    <div style="height:12px"></div>
  </div>`);
};

function getOverloadTip(hist){
  if(!hist.length)return null;
  // Always show a suggestion based on last session even if only 1 session logged
  const last=hist[0];
  const lastMax=Math.max(...last.sets.map(s=>+s.w||0));
  const lastReps=last.sets.length?last.sets[0].r:8;
  if(!lastMax)return null;
  const suggested=lastMax+5;
  // If 4+ sessions, detect plateau vs progress
  if(hist.length>=4){
    const rMax=Math.max(...hist.slice(0,3).flatMap(h=>h.sets.map(s=>+s.w||0)));
    const oMax=Math.max(...hist.slice(3,6).flatMap(h=>h.sets.map(s=>+s.w||0)));
    if(rMax<=oMax){
      return'📉 Plateau — try <strong>'+suggested+'lbs</strong> for '+(+lastReps+1)+' reps, or drop weight and increase reps.';
    }
  }
  return'💡 Last session: '+lastMax+'lbs. Try <strong>'+suggested+'lbs</strong> next set.';
}

  if(!u){document.getElementById('fp-err').textContent='Enter your username';return;}
  if(!S.users[u]){document.getElementById('fp-err').textContent='Username not found';return;}
  document.getElementById('fp-err').textContent='';
  const user=S.users[u];
  const hint=user.pwHint||null;
  const res=document.getElementById('fp-result');
  res.style.display='block';
  res.innerHTML='<div style="font-size:13px;font-weight:600;margin-bottom:6px">Account found: '+user.name+'</div>'
    +(hint?'<div style="font-size:13px;color:var(--text2)">Password hint: <strong>'+hint+'</strong></div>'
          :'<div style="font-size:13px;color:var(--text3)">No password hint was set for this account.</div>');
};

// ─── EXPORT / IMPORT ───
window.exportProfile=function(){
  const u=S.current;if(!u)return;
  const data={
    version:1,
    exportedAt:new Date().toISOString(),
    user:S.users[u],
    logs:S.logs[u]||{},
    customEx:S.customEx[u]||{},
    customSplitDef:S.customSplitDef||null,
    userExInfo:S.userExInfo||{}
  };
  const json=JSON.stringify(data,null,2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;
  a.download='optimal-profile-'+u+'-'+new Date().toISOString().slice(0,10)+'.json';
  document.body.appendChild(a);a.click();
  document.body.removeChild(a);URL.revokeObjectURL(url);
  showSheet(`<div class="m-handle"></div>
  <div style="padding:20px;text-align:center">
    <div style="font-size:48px;margin:16px 0">📦</div>
    <div class="m-title" style="padding:0;text-align:center;margin-bottom:8px">Profile Exported!</div>
    <div style="font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:24px">
      Your profile file has been downloaded. To use it on another device, open Optimal there and tap <strong>Import Profile</strong> in Settings.
    </div>
    <button onclick="closeSheet()" class="log-btn" style="margin-top:0">Done</button>
    <div style="height:12px"></div>
  </div>`);
};

window.importProfile=function(){
  showSheet(`<div class="m-handle"></div>
  <div class="m-title">Import Profile</div>
  <div style="padding:0 20px">
    <div style="font-size:14px;color:var(--text2);line-height:1.6;margin-bottom:20px">
      Select an Optimal profile file (.json) exported from another device. Your workouts and settings will be restored.
    </div>
    <div style="background:var(--bg3);border:2px dashed var(--border2);border-radius:var(--radius);padding:28px 20px;text-align:center;margin-bottom:16px">
      <div style="font-size:32px;margin-bottom:10px">📂</div>
      <div style="font-size:14px;color:var(--text2);margin-bottom:14px">Tap to select your profile file</div>
      <input type="file" id="import-file" accept=".json" onchange="doImportProfile(this)" style="position:absolute;opacity:0;width:100%;height:100%;top:0;left:0;cursor:pointer">
      <button onclick="document.getElementById('import-file').click()" class="log-btn" style="margin-top:0;width:auto;padding:12px 28px;display:inline-block">Choose File</button>
    </div>
    <div class="auth-err" id="import-err"></div>
    <div style="height:12px"></div>
  </div>`);
};

window.doImportProfile=function(input){
  const file=input.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=JSON.parse(e.target.result);
      if(!data.version||!data.user||!data.user.username){
        document.getElementById('import-err').textContent='Invalid file — not an Optimal profile.';return;
      }
      const u=data.user.username;
      // Restore user data
      S.users[u]=data.user;
      if(data.logs)S.logs[u]=data.logs;
      if(data.customEx)S.customEx[u]=data.customEx;
      if(data.customSplitDef)S.customSplitDef=data.customSplitDef;
      if(data.userExInfo)S.userExInfo=data.userExInfo;
      S.current=u;
      S.save();
      closeSheet();
      render();
    }catch(err){
      document.getElementById('import-err').textContent='Could not read file. Make sure it is a valid Optimal export.';
    }
  };
  reader.readAsText(file);
};

// ─── WEEKLY SUMMARY ───
window.showWeekly=()=>{
  const wk=S.weekLogs();const total=Object.keys(S.logs[S.current]||{}).length;
  // Compute real muscle volume
  const mOrder=['Chest','Back','Shoulders','Quads','Hamstrings','Biceps','Triceps','Calves','Abs'];
  const mVol={};
  wk.forEach(([,day])=>Object.entries(day).forEach(([ex,sets])=>{
    const m=muscleOf(ex);if(m==='Compound')return;
    if(!mVol[m])mVol[m]=0;sets.forEach(s=>mVol[m]+=(+s.w||0)*(+s.r||0));
  }));
  const hasDat=Object.keys(mVol).length>0;
  const ov=document.createElement('div');ov.className='wk-overlay';
  ov.innerHTML=`<div class="wk-card fade-in">
    <div class="wk-title">WEEKLY<br>SUMMARY</div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:22px;letter-spacing:.5px;text-transform:uppercase">Your past 7 days</div>
    <div class="wk-row"><span style="font-size:14px;color:var(--text2)">Workouts this week</span><strong style="font-size:24px;color:var(--blue2)">${wk.length}</strong></div>
    <div class="wk-row"><span style="font-size:14px;color:var(--text2)">All-time sessions</span><strong style="font-size:18px">${total}</strong></div>
    ${hasDat?`<div style="margin:14px 0 8px" class="sec-lbl">Volume by Muscle</div>
    ${mOrder.filter(m=>mVol[m]).sort((a,b)=>mVol[b]-mVol[a]).map(m=>`<div class="wk-row"><span style="font-size:14px;color:var(--text2)">${m}</span>
      <div style="text-align:right"><div style="font-size:14px;font-weight:600">${Math.round(mVol[m]).toLocaleString()} vol</div></div>
    </div>`).join('')}`:`<div style="font-size:13px;color:var(--text3);padding:14px 0">Log some workouts this week to see your breakdown.</div>`}
    <button class="btn-blue" style="margin-top:20px" onclick="this.closest('.wk-overlay').remove()">Close</button>
  </div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)ov.remove()});
  document.body.appendChild(ov);
};

// ─── MODAL SHEET ───
function showSheet(html){
  closeSheet();
  const ov=document.createElement('div');ov.className='m-overlay';ov.id='modal-ov';
  ov.innerHTML=`<div class="m-sheet sheet-in">${html}</div>`;
  ov.addEventListener('click',e=>{if(e.target===ov)closeSheet()});
  document.body.appendChild(ov);
}
window.closeSheet=()=>{const o=document.getElementById('modal-ov');if(o)o.remove()};

render();
</script>
</body>
</html>
